<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f4c75;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0a3d5c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#051d2b;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="robotGlow" cx="70%" cy="40%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.3" />
      <stop offset="70%" style="stop-color:#06b6d4;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#0a3d5c;stop-opacity:0" />
    </radialGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1400" height="900" fill="url(#bgGradient)"/>

  <!-- Glow overlay -->
  <ellipse cx="1000" cy="350" rx="400" ry="350" fill="url(#robotGlow)"/>

  <!-- Neural Network Lines -->
  <g stroke="#06b6d4" stroke-width="1" opacity="0.2">
    <line x1="800" y1="100" x2="1100" y2="400"/>
    <line x1="900" y1="150" x2="1200" y2="500"/>
    <line x1="950" y1="200" x2="1150" y2="550"/>
    <line x1="1000" y1="100" x2="1300" y2="600"/>
    <line x1="850" y1="300" x2="1250" y2="400"/>
    <line x1="950" y1="500" x2="1350" y2="650"/>
  </g>

  <!-- Robot/AI Figure (Stylized) -->
  <g filter="url(#glow)" opacity="0.7">
    <!-- Head -->
    <circle cx="1050" cy="300" r="80" fill="#06b6d4" opacity="0.2"/>
    <circle cx="1050" cy="300" r="75" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
    
    <!-- Eyes -->
    <circle cx="1020" cy="280" r="8" fill="#00d4ff" opacity="0.8"/>
    <circle cx="1080" cy="280" r="8" fill="#00d4ff" opacity="0.8"/>
    <circle cx="1020" cy="280" r="4" fill="#ffffff" opacity="0.9"/>
    <circle cx="1080" cy="280" r="4" fill="#ffffff" opacity="0.9"/>
    
    <!-- Face plate -->
    <line x1="1030" y1="320" x2="1070" y2="320" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
    
    <!-- Body -->
    <rect x="980" y="380" width="140" height="180" rx="10" fill="none" stroke="#06b6d4" stroke-width="2" opacity="0.6"/>
    <rect x="990" y="390" width="120" height="40" fill="#06b6d4" opacity="0.15"/>
    
    <!-- Arms -->
    <line x1="980" y1="420" x2="920" y2="450" stroke="#00d4ff" stroke-width="3" opacity="0.6" stroke-linecap="round"/>
    <line x1="1120" y1="420" x2="1180" y2="450" stroke="#00d4ff" stroke-width="3" opacity="0.6" stroke-linecap="round"/>
    
    <!-- Hands -->
    <circle cx="920" cy="450" r="12" fill="#06b6d4" opacity="0.4"/>
    <circle cx="920" cy="450" r="10" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.7"/>
    <circle cx="1180" cy="450" r="12" fill="#06b6d4" opacity="0.4"/>
    <circle cx="1180" cy="450" r="10" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.7"/>
    
    <!-- Legs -->
    <line x1="1010" y1="560" x2="1000" y2="630" stroke="#00d4ff" stroke-width="3" opacity="0.6" stroke-linecap="round"/>
    <line x1="1090" y1="560" x2="1100" y2="630" stroke="#00d4ff" stroke-width="3" opacity="0.6" stroke-linecap="round"/>
    
    <!-- Feet -->
    <circle cx="1000" cy="630" r="10" fill="#06b6d4" opacity="0.3"/>
    <circle cx="1100" cy="630" r="10" fill="#06b6d4" opacity="0.3"/>
  </g>

  <!-- Floating particles -->
  <g fill="#00d4ff" opacity="0.3">
    <circle cx="750" cy="200" r="2"/>
    <circle cx="900" cy="400" r="2"/>
    <circle cx="1200" cy="350" r="1.5"/>
    <circle cx="1100" cy="200" r="1.5"/>
    <circle cx="850" cy="550" r="2"/>
    <circle cx="1250" cy="500" r="1.5"/>
  </g>

  <!-- Additional glow circles -->
  <circle cx="1050" cy="350" r="250" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.1"/>
  <circle cx="1050" cy="350" r="350" fill="none" stroke="#00d4ff" stroke-width="0.5" opacity="0.05"/>
</svg>